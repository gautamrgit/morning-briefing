<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G's Morning Briefing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root {
    --bg: #faf9f6; --text: #1f1f1f; --body: #3d3a35; --muted: #767066;
    --accent: #b45309; --border: #e7e2d8; --chip: #f0ece3; --headline: #111111;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.6; font-size: 17px;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 18px 90px; }
  header.site { border-bottom: 2px solid var(--text); padding-bottom: 10px; }
  header.site h1 { font-size: 24px; margin: 0; }
  .meta { color: var(--muted); font-size: 13px; font-family: -apple-system, system-ui, sans-serif; margin-top: 4px; }
  #intro h1 { font-size: 21px; margin: 18px 0 2px; }
  #intro p em, #intro em { color: var(--muted); font-size: 15px; }
  #intro p { margin: 4px 0 12px; }

  .chips {
    display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 4px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; background: var(--chip); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 12px; font-size: 15px; cursor: pointer;
    font-family: -apple-system, system-ui, sans-serif; color: var(--text);
  }
  .toolbar { display: flex; justify-content: flex-end; padding: 6px 0 2px; }
  .toolbar button {
    background: none; border: none; color: var(--accent); cursor: pointer;
    font-family: -apple-system, system-ui, sans-serif; font-size: 13px; padding: 4px 0;
  }

  details.sec { border-bottom: 1px solid var(--border); }
  details.sec summary {
    list-style: none; cursor: pointer; display: flex; align-items: center;
    gap: 10px; padding: 16px 2px; font-size: 19px; font-weight: 700;
    user-select: none;
  }
  details.sec summary::-webkit-details-marker { display: none; }
  details.sec summary .count {
    margin-left: auto; font-size: 12px; font-weight: 400; color: var(--muted);
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--chip); border-radius: 999px; padding: 3px 9px; white-space: nowrap;
  }
  details.sec summary .chev { transition: transform .2s; color: var(--muted); font-size: 13px; }
  details.sec[open] summary .chev { transform: rotate(90deg); }
  .sec-body { padding: 2px 2px 10px; }
  .sec-body p { margin: 0 0 22px; color: var(--body); font-size: 16px; }
  .sec-body p > strong:first-child {
    display: block; color: var(--headline);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 16.5px; line-height: 1.35; margin-bottom: 5px;
  }
  .sec-body em { color: var(--muted); font-size: 14px; }
  .sec-body a { color: var(--accent); text-decoration: none; }
  #status { color: var(--muted); font-family: -apple-system, system-ui, sans-serif; font-size: 14px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <h1>&#9728;&#65039; G's Morning Briefing</h1>
    <div class="meta" id="updated">Gautam's daily read</div>
  </header>
  <div id="status">Loading briefing&#8230;</div>
  <div id="intro"></div>
  <div class="chips" id="chips" hidden></div>
  <div class="toolbar" id="toolbar" hidden><button id="toggleAll">Expand all</button></div>
  <div id="sections"></div>
</div>
<script>
(function () {
  const REPO = 'gautamrgit/morning-briefing';
  // Preferred section order, by leading emoji. Unlisted sections keep file order at the end.
  const ORDER = ['\u{1F3E2}', '\u{1F3C1}', '\u{1F4C8}', '\u{1F9EC}', '\u{1F3CF}', '\u{1F3BE}', '\u{1F33F}', '\u{1F9D8}'];

  fetch('https://api.github.com/repos/' + REPO + '/commits?path=briefing.md&per_page=1')
    .then(r => r.json())
    .then(c => {
      const d = new Date(c[0].commit.committer.date);
      const mins = Math.round((Date.now() - d) / 60000);
      const ago = mins < 60 ? mins + ' min ago'
        : mins < 1440 ? Math.round(mins / 60) + ' h ago'
        : Math.round(mins / 1440) + ' d ago';
      document.getElementById('updated').textContent = 'Updated ' + ago;
    })
    .catch(() => {});

  fetch('briefing.md', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(build)
    .catch(() => {
      document.getElementById('status').textContent =
        'Could not load briefing.md - check that the file exists in the repo.';
    });

  function orderIndex(title) {
    for (let i = 0; i < ORDER.length; i++) {
      if (title.startsWith(ORDER[i])) return i;
    }
    return 99;
  }

  function build(md) {
    document.getElementById('status').style.display = 'none';
    const tmp = document.createElement('div');
    tmp.innerHTML = marked.parse(md);

    const intro = document.getElementById('intro');
    const sections = document.getElementById('sections');
    const chips = document.getElementById('chips');
    const built = [];
    let current = null;

    Array.from(tmp.childNodes).forEach(node => {
      if (node.nodeType !== 1) return;
      if (node.tagName === 'HR') return;
      if (node.tagName === 'H2') {
        const title = node.textContent.trim();
        const det = document.createElement('details');
        det.className = 'sec';
        det.innerHTML = '<summary><span class="chev">&#9654;</span><span class="t"></span>' +
                        '<span class="count"></span></summary><div class="sec-body"></div>';
        det.querySelector('.t').textContent = title;
        built.push({ det: det, title: title });
        current = det.querySelector('.sec-body');
      } else if (current) {
        current.appendChild(node.cloneNode(true));
      } else {
        intro.appendChild(node.cloneNode(true));
      }
    });

    // Reorder sections to the preferred order
    built.sort((a, b) => orderIndex(a.title) - orderIndex(b.title));
    built.forEach(s => {
      sections.appendChild(s.det);
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = s.title.split(' ').slice(0, 2).join(' ');
      chip.onclick = () => { s.det.open = true; s.det.scrollIntoView({ behavior: 'smooth' }); };
      chips.appendChild(chip);
    });

    // Headline styling cleanup: strip the leading em-dash after each bold headline
    document.querySelectorAll('.sec-body > p > strong:first-child').forEach(strong => {
      const next = strong.nextSibling;
      if (next && next.nodeType === 3) {
        next.textContent = next.textContent.replace(/^\s*[—–-]\s*/, '');
      }
    });

    // Open all links in a new tab
    document.querySelectorAll('#sections a, #intro a').forEach(a => {
      a.target = '_blank';
      a.rel = 'noopener';
    });

    // Item counts
    document.querySelectorAll('details.sec').forEach(det => {
      const n = det.querySelectorAll('.sec-body > p > strong:first-child').length;
      det.querySelector('.count').textContent = n ? n + (n === 1 ? ' item' : ' items') : '';
    });

    chips.hidden = false;
    document.getElementById('toolbar').hidden = false;

    const first = document.querySelector('details.sec');
    if (first) first.open = true;

    const btn = document.getElementById('toggleAll');
    btn.onclick = () => {
      const all = document.querySelectorAll('details.sec');
      const expand = btn.textContent === 'Expand all';
      all.forEach(d => d.open = expand);
      btn.textContent = expand ? 'Collapse all' : 'Expand all';
    };
  }
})();
</script>
</body>
</html>
